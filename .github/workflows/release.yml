name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos-arm64:
    name: Build macOS ARM64
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: bridge/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd bridge
          npm install
          npx frida-compile agent.js -c -B iife -o agent.bundle.js
          pip install pyinstaller frida

      - name: Build TUI
        run: ./gradlew linkReleaseExecutableMacosArm64

      - name: Build Bridge
        run: |
          cd bridge
          pyinstaller bridge.spec

      - name: Prepare Artifacts
        run: |
          mkdir -p staging
          if [ -f "build/bin/macosArm64/releaseExecutable/idk.kexe" ]; then
            cp build/bin/macosArm64/releaseExecutable/idk.kexe staging/idk
          elif [ -f "build/bin/macosArm64/releaseExecutable/idk" ]; then
            cp build/bin/macosArm64/releaseExecutable/idk staging/idk
          else
            echo "Error: Kotlin TUI binary not found"
            exit 1
          fi
          
          if [ -f "bridge/dist/idk-bridge" ]; then
            cp bridge/dist/idk-bridge staging/idk-bridge
          else
            echo "Error: Bridge binary not found"
            exit 1
          fi
          
          chmod +x staging/idk staging/idk-bridge
          cd staging
          zip -r ../idk-macos-arm64.zip .
          cd ..
          cp staging/idk idk-tui-macos-arm64
          cp staging/idk-bridge idk-bridge-macos-arm64

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: |
            idk-macos-arm64.zip
            idk-tui-macos-arm64
            idk-bridge-macos-arm64

  publish-artifacts:
    name: Publish Artifacts to GitHub Release
    needs: [build-macos-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download macOS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64

      - name: Create Release
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            idk-macos-arm64.zip \
            idk-tui-macos-arm64 \
            idk-bridge-macos-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
