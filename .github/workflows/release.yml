name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      run-linux:
        description: 'Run Linux build'
        required: false
        default: true
      run-macos:
        description: 'Run macOS build'
        required: false
        default: true

jobs:
  build-macos:
    if: ${{ github.event.inputs.run-macos == 'true' }}
    name: Build macOS ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-15
            target: arm64
          # todo: add support for macosX64
          # - os: macos-13
          #   target: x64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: bridge/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: make install_dependencies

      - name: Release
        run: make release

      - name: Package Artifacts
        run: |
          zip -r ./idk-macos-${{ matrix.target }}.zip ./dist
          cp dist/idk idk-macos-${{ matrix.target }}-tui
          cp dist/idk-bridge idk-macos-${{ matrix.target }}-bridge

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-${{ matrix.target }}
          path: |
            idk-macos-${{ matrix.target }}.zip
            idk-macos-${{ matrix.target }}-tui
            idk-macos-${{ matrix.target }}-bridge

  build-linux:
    if: ${{ github.event.inputs.run-linux == 'true' }}
    name: Build Linux ${{ matrix.target }}
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - arch: x86_64
            target: x64
          - arch: aarch64
            target: arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up native compilation dependencies
        if: matrix.arch == 'x86_64'
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Set up cross-compilation dependencies
        if: matrix.arch == 'aarch64'
        run: bash scripts/setup_linux_arm64_deps.sh

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: bridge/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: make install_dependencies

      - name: Compile JS Agent & Kotlin Binary
        run: |
          make compile_bridge_agent
          make compile_binary ARCH=${{ matrix.arch }}

      - name: Compile Python Bridge (Native x86_64)
        if: matrix.arch == 'x86_64'
        run: make compile_bridge

      - name: Compile Python Bridge (Docker ARM64)
        if: matrix.arch == 'aarch64'
        run: |
          make compile_bridge_agent
          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}:/app -w /app \
            python:3.11-slim \
            bash -c "apt-get update && apt-get install -y binutils && pip install -r bridge/requirements.txt && cd bridge && pyinstaller bridge.spec"

      - name: Package Artifacts
        run: |
          make prepare_release ARCH=${{ matrix.arch }}
          zip -r ./idk-linux-${{ matrix.target }}.zip ./dist
          cp dist/idk idk-linux-${{ matrix.target }}-tui
          cp dist/idk-bridge idk-linux-${{ matrix.target }}-bridge

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-${{ matrix.target }}
          path: |
            idk-linux-${{ matrix.target }}.zip
            idk-linux-${{ matrix.target }}-tui
            idk-linux-${{ matrix.target }}-bridge

  publish-artifacts:
    name: Publish Artifacts to GitHub Release
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4 # using v4 to get the merge-multiple feature
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            artifacts/idk-*.zip \
            artifacts/idk-*-tui \
            artifacts/idk-*-bridge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}