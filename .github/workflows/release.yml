name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos-arm64:
    name: Build macOS ARM64
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: bridge/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: make install_dependencies

      - name: Compile
        run: make compile

      - name: Release
        run: make release

      - name: Package Artifacts
        run: |
          zip -r ./idk-macos-arm64.zip ./dist
          cp dist/idk idk-macos-arm64-tui
          cp dist/idk-bridge idk-macos-arm64-bridge

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: |
            idk-macos-arm64.zip
            idk-macos-arm64-tui
            idk-macos-arm64-bridge

  build-linux-arm64:
    name: Build Linux ARM64
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up cross-compilation dependencies
        run: bash scripts/setup_linux_arm64_deps.sh

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: bridge/package-lock.json

      - name: Install dependencies
        run: make install_dependencies

      - name: Compile
        run: make compile

      - name: Release
        run: make release

      - name: Package Artifacts
        run: |
          zip -r ./idk-linux-arm64.zip ./dist
          cp dist/idk idk-linux-arm64-tui
          cp dist/idk-bridge idk-linux-arm64-bridge

      - name: Upload Linux ARM64 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: |
            idk-linux-arm64.zip
            idk-linux-arm64-tui
            idk-linux-arm64-bridge

  publish-artifacts:
    name: Publish Artifacts to GitHub Release
    needs: [build-macos-arm64, build-linux-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download macOS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64

      - name: Download Linux ARM64 Artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-arm64

      - name: Create Release
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            idk-macos-arm64.zip \
            idk-macos-arm64-tui \
            idk-macos-arm64-bridge \
            idk-linux-arm64.zip \
            idk-linux-arm64-tui \
            idk-linux-arm64-bridge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
